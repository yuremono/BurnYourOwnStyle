<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景/顔のベース -->
  <path d="M100,250 Q100,450 250,450 Q400,450 400,250 Q400,100 250,100 Q100,100 100,250" fill="#fff5f0" stroke="#000" stroke-width="4"/>

  <!-- 耳 -->
  <path d="M105,300 Q80,300 80,330 Q80,360 110,360" fill="#fff5f0" stroke="#000" stroke-width="4"/>

  <!-- 髪 -->
  <path d="M100,250 Q100,100 250,100 Q400,100 400,250 L400,320 Q380,280 350,300 Q320,320 300,280 Q280,240 250,260 Q220,280 200,240 Q180,200 150,230 Q120,260 100,320 Z" fill="#5d4a44" stroke="#000" stroke-width="4"/>
  <!-- 髪の毛先（左側のツノのような部分） -->
  <path d="M110,250 Q70,240 90,270 Q100,280 115,270" fill="#5d4a44" stroke="#000" stroke-width="4"/>

  <!-- メガネ -->
  <g stroke="#000" stroke-width="12" fill="none">
    <!-- 左レンズ -->
    <path d="M110,270 Q110,240 200,240 Q290,240 290,270 Q290,340 200,340 Q110,340 110,270" fill="#fff" stroke-width="15"/>
    <!-- 右レンズ -->
    <path d="M210,270 Q210,240 300,240 Q390,240 390,270 Q390,340 300,340 Q210,340 210,270" fill="#fff" stroke-width="15"/>
    <!-- ブリッジ -->
    <path d="M290,270 L210,270" stroke-width="15"/>
  </g>

  <!-- 口 -->
  <path d="M230,380 L270,380 M230,375 L230,385 M270,375 L270,385" stroke="#000" stroke-width="4" fill="none"/>
</svg>
<svg
						viewBox="0 0 500 500"
						role="img"
						aria-label="パス描画デモ"
