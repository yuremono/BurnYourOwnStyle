						<path
							d="M110,250 Q70,240 90,270 Q100,280 115,270"
							fill="#5d4a44"
							stroke="#000"
							stroke-width="4"
						/>

						{/* <!-- メガネ --> */}
						<g stroke="#000" stroke-width="12" fill="none">
